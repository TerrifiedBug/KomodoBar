name: CI
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Lint
        run: |
          brew install swiftformat swiftlint
          swiftformat --lint Sources Tests
          swiftlint --strict
      - name: Build
        run: swift build
      - name: Test
        run: swift test
